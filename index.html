<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Panel Berrinche</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ============================================================
           TOKENS — Editá acá para cambiar toda la paleta del dashboard
           ============================================================ */
        :root {
            /* Marca */
            --brand:          #7367f0;
            --brand-soft:     #eaeafe;
            --brand-dark:     #5a52cc;

            /* Semáforo */
            --success:        #28c76f;
            --success-soft:   #ddf6e9;
            --warning:        #ff9f43;
            --warning-soft:   #fff3e8;
            --danger:         #ea5455;
            --danger-soft:    #fde8e8;

            /* Tiers */
            --tier-grande:    #7367f0;
            --tier-mediana:   #00cfe8;
            --tier-chica:     #ff9f43;

            /* Tipografía y fondos */
            --text-primary:   #1e1e2d;
            --text-secondary: #6e6b7b;
            --text-muted:     #b9b9c3;
            --bg:             #f4f3fb;
            --card:           #ffffff;
            --border:         #e8e6f0;

            /* Espaciado */
            --gap:            16px;
            --radius:         14px;
            --radius-sm:      8px;

            /* Sombras */
            --shadow-sm:      0 2px 8px rgba(115,103,240,.06);
            --shadow-md:      0 4px 20px rgba(115,103,240,.10);
        }

        /* ============================================================
           RESET Y BASE
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            padding: 0 0 60px;
        }

        /* ============================================================
           HEADER STICKY
           ============================================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 12px 16px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-sync {
            background: var(--success);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .header-bottom {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .header-bottom select,
        .header-bottom input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
        }

        .header-bottom select:focus,
        .header-bottom input:focus {
            border-color: var(--brand);
        }

        .toggle-pausados {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 10px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 16px;
            height: 38px;
            flex-shrink: 0;
        }

        .toggle-pausados input { display: none; }

        .toggle-pausados:has(input:checked) {
            border-color: var(--danger);
            background: var(--danger-soft);
        }

        .client-item.pausado-item {
            opacity: .7;
            border-left: 3px solid var(--danger);
        }

        /* ============================================================
           CONTENEDOR PRINCIPAL
           ============================================================ */
        .main {
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ============================================================
           KPI GRID
           ============================================================ */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--gap);
            margin-bottom: var(--gap);
        }

        .kpi-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--kpi-accent, var(--brand));
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--text-secondary);
        }

        .kpi-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--kpi-color, var(--text-primary));
            line-height: 1.1;
        }

        /* ============================================================
           SECCIÓN GRÁFICOS
           ============================================================ */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--gap);
            margin-bottom: var(--gap);
        }

        @media (min-width: 640px) {
            .charts-grid { grid-template-columns: 1.4fr 1fr; }
        }

        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow-sm);
        }

        .chart-card h3 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .chart-history-wrap  { position: relative; height: 200px; }
        .chart-donut-wrap    { position: relative; height: 180px; }

        .donut-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            padding-bottom: 20px;
        }

        .donut-center-val {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .donut-center-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* ============================================================
           TIER SECTIONS
           ============================================================ */
        .tier-section { margin-bottom: 20px; }

        .tier-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--card);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            border-left: 5px solid var(--tier-color);
            box-shadow: var(--shadow-sm);
        }

        .tier-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tier-name {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--tier-color);
        }

        .tier-count-badge {
            background: var(--tier-color);
            color: #fff;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
        }

        .tier-totals { text-align: right; }
        .tier-total-main { font-size: 15px; font-weight: 800; color: var(--tier-color); }
        .tier-total-sub { font-size: 11px; color: var(--text-muted); }

        /* ============================================================
           TARJETA DE CLIENTE
           ============================================================ */
        .client-item {
            background: var(--card);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .client-item.subordinated {
            border-left: 4px dashed var(--border);
            margin-left: 16px;
            background: #fafafa;
        }

        .client-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 12px 14px 8px;
            gap: 8px;
        }

        .client-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .client-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .client-top-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .client-controls { display: flex; align-items: center; gap: 6px; padding: 0 14px 10px; flex-wrap: wrap; }

        .budget-wrap {
            display: flex;
            align-items: center;
            gap: 3px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 8px;
        }

        .budget-symbol { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
        .budget-input-live { width: 90px; padding: 7px 0; font-size: 14px; font-weight: 700; border: none; background: transparent; text-align: right; color: var(--text-primary); outline: none; }
        .budget-input-live:disabled { color: var(--text-secondary); cursor: not-allowed; }

        .tier-select-live, .account-status-select { padding: 7px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; font-weight: 600; color: var(--text-secondary); outline: none; }
        .account-status-select.activo  { color: var(--success); border-color: var(--success); }
        .account-status-select.pausado { color: var(--danger);  border-color: var(--danger); }

        .status-btn { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; }
        .status-btn.pagado   { background: var(--success-soft); color: var(--success); }
        .status-btn.pendiente{ background: var(--warning-soft); color: var(--warning); }

        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 20px; padding: 4px 6px; opacity: .35; }
        .delete-btn:hover { opacity: 1; }

        .client-badges { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 14px 6px; }
        .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-platform { background: #f1f0f6; color: var(--text-secondary); }
        .badge-recurrence { background: var(--brand-soft); color: var(--brand); }

        .notes-row, .tag-row { border-top: 1px dashed var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 6px; }
        .notes-label, .tag-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .notes-input-live, .tag-input-live { flex: 1; border: none; background: transparent; font-size: 13px; color: var(--text-secondary); outline: none; }
        .tag-input-live { font-weight: 600; color: var(--brand); }

        .view-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: var(--gap); }
        .view-toggle-btn { flex: 1; padding: 9px 12px; border: none; background: transparent; font-size: 13px; font-weight: 700; color: var(--text-secondary); cursor: pointer; }
        .view-toggle-btn.active { background: var(--brand); color: #fff; }

        .tag-group { margin-bottom: 20px; }
        .tag-group-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--card); border-radius: var(--radius-sm); margin-bottom: 10px; border-left: 5px solid var(--brand); box-shadow: var(--shadow-sm); cursor: pointer; }
        .tag-group-name { font-size: 13px; font-weight: 800; text-transform: uppercase; color: var(--brand); }
        .tag-group-badge { background: var(--brand); color: #fff; border-radius: 20px; font-size: 10px; padding: 2px 7px; }
        .tag-group-totals { text-align: right; }
        .tag-group-total-main { font-size: 15px; font-weight: 800; color: var(--brand); }
        .tag-group-total-sub  { font-size: 11px; color: var(--text-muted); }
        .tag-group-body.collapsed { display: none; }

        .form-card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-top: 24px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); color: var(--text-primary); outline: none; width: 100%; }
        .submit-btn { grid-column: 1 / -1; background: var(--brand); color: #fff; border: none; padding: 13px; border-radius: var(--radius-sm); font-weight: 700; font-size: 15px; cursor: pointer; }

        .loading-overlay { position: fixed; inset: 0; background: rgba(244,243,251,.92); display: none; justify-content: center; align-items: center; z-index: 9999; font-weight: 700; color: var(--brand); font-size: 16px; flex-direction: column; gap: 12px; }
        .loader-spinner { width: 36px; height: 36px; border: 3px solid var(--brand-soft); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (min-width: 640px) { .main { padding: 20px; } .kpi-grid { grid-template-columns: repeat(4, 1fr); } .form-grid { grid-template-columns: repeat(3, 1fr); } .client-controls { flex-wrap: nowrap; } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingView"><div class="loader-spinner"></div>Sincronizando con Sheets...</div>

<header class="header">
    <div class="header-top">
        <h1>🎯 Berrinche</h1>
        <div class="header-actions"><button class="btn-sync" onclick="loadDataFromSheet(true)">🔄 Sync</button></div>
    </div>
    <div class="header-bottom">
        <select id="view-month" onchange="renderDashboard()"><option value="Todos">Histórico completo</option></select>
        <input type="text" id="search-input" oninput="renderDashboard()" placeholder="Buscar cliente, tag...">
        <label class="toggle-pausados"><input type="checkbox" id="show-pausados" onchange="renderDashboard()"><span>实时 🔴</span></label>
    </div>
</header>

<div class="main">
    <!-- KPIs -->
    <div class="kpi-grid">
        <div class="kpi-card" style="--kpi-accent: var(--brand);"><span class="kpi-label">Facturación</span><span class="kpi-value" id="kpi-total">$0</span></div>
        <div class="kpi-card" style="--kpi-accent: var(--success);"><span class="kpi-label">Cobrado</span><span class="kpi-value" id="kpi-cobrado">$0</span></div>
        <div class="kpi-card" style="--kpi-accent: var(--warning);"><span class="kpi-label">Por cobrar</span><span class="kpi-value" id="kpi-pendiente">$0</span></div>
        <div class="kpi-card" style="--kpi-accent: var(--tier-mediana);"><span class="kpi-label" id="kpi-label-cuentas">Ítems activos</span><span class="kpi-value" id="kpi-cuentas">0</span></div>
    </div>

    <!-- GRÁFICOS -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>Evolución de ingresos</h3>
            <div class="chart-history-wrap"><canvas id="historyChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3>Distribución por tier</h3>
            <div style="position: relative;">
                <div class="chart-donut-wrap"><canvas id="tierChart"></canvas></div>
                <div class="donut-center"><span class="donut-center-val" id="donut-total">$0</span><span class="donut-center-label">Total</span></div>
            </div>
        </div>
    </div>

    <div class="view-toggle">
        <button class="view-toggle-btn active" id="btn-view-tier" onclick="setView('tier')">Por tier</button>
        <button class="view-toggle-btn"        id="btn-view-tag"  onclick="setView('tag')">Por tag</button>
    </div>

    <div id="tiers-container">
        <div class="tier-section" style="--tier-color: var(--tier-grande)">
            <div class="tier-header"><div class="tier-header-left"><span class="tier-name">Grandes</span><span class="tier-count-badge" id="count-grande">0</span></div><div class="tier-totals"><div class="tier-total-main" id="total-grande">$0</div><div class="tier-total-sub" id="pendiente-grande">$0 pendiente</div></div></div>
            <div id="list-grande"></div>
        </div>
        <div class="tier-section" style="--tier-color: var(--tier-mediana)">
            <div class="tier-header"><div class="tier-header-left"><span class="tier-name">Medianas</span><span class="tier-count-badge" id="count-mediana">0</span></div><div class="tier-totals"><div class="tier-total-main" id="total-mediana">$0</div><div class="tier-total-sub" id="pendiente-mediana">$0 pendiente</div></div></div>
            <div id="list-mediana"></div>
        </div>
        <div class="tier-section" style="--tier-color: var(--tier-chica)">
            <div class="tier-header"><div class="tier-header-left"><span class="tier-name">Chicas</span><span class="tier-count-badge" id="count-chica">0</span></div><div class="tier-totals"><div class="tier-total-main" id="total-chica">$0</div><div class="tier-total-sub" id="pendiente-chica">$0 pendiente</div></div></div>
            <div id="list-chica"></div>
        </div>
    </div>

    <div id="tags-container" style="display:none;"></div>

    <div class="form-card">
        <h3>➕ Cargar ítem</h3>
        <form id="client-form" onsubmit="addClient(event)">
            <div class="form-grid">
                <div class="form-group"><label>Cliente / cuenta</label><input type="text" id="form-name" required></div>
                <div class="form-group"><label>Contacto / tag</label><input type="text" id="form-contact" required></div>
                <div class="form-group"><label>Presupuesto ($)</label><input type="number" id="form-budget" required></div>
                <div class="form-group"><label>Mes inicio</label><select id="form-month"></select></div>
                <div class="form-group"><label>Tier</label><select id="form-tier"><option value="grande">Grande</option><option value="mediana" selected>Mediana</option><option value="chica">Chica</option></select></div>
                <div class="form-group"><label>Plataforma</label><select id="form-platform"><option value="Meta+Google">Meta + Google</option><option value="Meta">Meta</option><option value="Google">Google</option></select></div>
                <div class="form-group"><label>Tag / grupo</label><input type="text" id="form-tag"></div>
                <div class="form-group"><label>Tipo contrato</label><select id="form-recurrence"><option value="fijo">Abono mensual (fijo)</option><option value="temporal">Servicio temporal</option></select></div>
                <div class="form-group"><label>Estructura</label><select id="form-sub-type" onchange="toggleSubInput(this.value)"><option value="principal">Ítem principal</option><option value="subordinado">Subordinar a...</option></select></div>
                <div class="form-group" id="parent-input-group" style="display: none;"><label style="color: var(--warning)">Cliente padre</label><input type="text" id="form-parent-name"></div>
                <button type="submit" class="submit-btn">Cargar ítem</button>
            </div>
        </form>
    </div>
</div>

<script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzMkOYligCGvXvT1z4SaI1aRS_4A216yW-2i517j3OMFkf5IDyywO0C3Teqmg-dgzWn/exec";
    let rawClients = [];
    let processedClients = [];
    let tierChart, historyChart;
    let currentView = 'tier';
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    function showLoader(v) { document.getElementById('loadingView').style.display = v ? 'flex' : 'none'; }
    function toggleSubInput(val) { document.getElementById('parent-input-group').style.display = val === 'subordinado' ? 'block' : 'none'; }
    function getMonthLabel(mStr) { if (!mStr || !mStr.includes('-')) return mStr; const [y, m] = mStr.split('-'); return (MESES[parseInt(m,10)-1] || m) + " " + y; }
    
    function parseCleanMonth(raw) {
        if (!raw) return "";
        let s = raw.toString().trim().toLowerCase();
        if (s.includes('/') || s.includes('t') || (s.includes('-') && s.split('-')[0].length !== 4)) {
            let d = new Date(raw);
            if (!isNaN(d)) return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
        }
        if (s.includes("enero")) return "2026-01";
        if (s.includes("junio")) return "2026-06";
        return /^\d{4}-\d{2}$/.test(s) ? s : s;
    }

    function getTimelineArray() {
        let set = new Set();
        rawClients.forEach(c => { let m = parseCleanMonth(c.month); if (m) set.add(m); });
        const hoy = new Date();
        for (let i=-3; i<=6; i++) {
            const d = new Date(hoy.getFullYear(), hoy.getMonth()+i, 1);
            set.add(d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0'));
        }
        return Array.from(set).sort();
    }

    function formatMoney(n) { return '$' + (n||0).toLocaleString('es-AR', {minimumFractionDigits:0, maximumFractionDigits:0}); }

    async function loadDataFromSheet(forzar=false) {
        showLoader(true);
        try {
            const res = await fetch(SHEET_API_URL);
            rawClients = await res.json();
            initDynamicMonths();
            renderDashboard();
        } catch(e) { alert("Error al conectar con Google Sheets."); }
        showLoader(false);
    }

    function processRecurrences(selectedMonth) {
        let activeList = [];
        let nativeItemsInMonth = rawClients.filter(x => parseCleanMonth(x.month) === selectedMonth);

        nativeItemsInMonth.forEach(item => {
            let isPausado = item.notes && item.notes.toString().toLowerCase().includes("[pausado]");
            if (!isPausado || document.getElementById('show-pausados').checked) {
                activeList.push({ ...item, month: selectedMonth, currentMonth: selectedMonth, isVirtual: false, pausado: isPausado });
            }
        });

        let uniqueBaseIds = new Set(rawClients.map(c => c.id.toString().split('_')[0]));
        uniqueBaseIds.forEach(baseId => {
            let history = rawClients.filter(x => { return x.id.toString().split('_')[0] === baseId && parseCleanMonth(x.month) < selectedMonth; });
            if (!history.length) return;
            history.sort((a,b) => parseCleanMonth(b.month).localeCompare(parseCleanMonth(a.month)) || b.id.toString().localeCompare(a.id.toString()));
            let latest = history[0];
            let isTemporal = latest.notes && latest.notes.toString().toLowerCase().includes("[temporal]");
            let isPausado  = latest.notes && latest.notes.toString().toLowerCase().includes("[pausado]");
            let alreadyNative = nativeItemsInMonth.some(x => x.id.toString().split('_')[0] === baseId);

            if (!isTemporal && (!isPausado || document.getElementById('show-pausados').checked) && !alreadyNative) {
                activeList.push({ ...latest, id: `${baseId}_${selectedMonth}`, month: selectedMonth, currentMonth: selectedMonth, isVirtual: true, pausado: isPausado });
            }
        });
        return activeList;
    }

    function initDynamicMonths() {
        const fSel = document.getElementById('view-month');
        const fForm = document.getElementById('form-month');
        const months = getTimelineArray();
        const hoy = new Date();
        const curr = hoy.getFullYear() + "-" + String(hoy.getMonth()+1).padStart(2,'0');
        const oldVal = fSel.value || curr;

        fForm.innerHTML = "";
        fSel.innerHTML = `<optgroup label="Períodos"><option value="Todos">Histórico completo</option></optgroup><optgroup label="Mes por mes">`;
        months.forEach(m => {
            fForm.innerHTML += `<option value="${m}" ${m===curr?'selected':''}>${getMonthLabel(m)}</option>`;
            fSel.innerHTML += `<option value="${m}" ${m===oldVal?'selected':''}>${getMonthLabel(m)}</option>`;
        });
        fSel.innerHTML += `</optgroup>`;
    }

    function getClientTag(c) {
        if (c.tag) return c.tag.trim();
        if (c.notes) { let m = c.notes.toString().match(/\[TAG:\s*([^\]]+)\]/i); if (m) return m[1].trim(); }
        return "";
    }

    function renderDashboard() {
        const selectedMonth = document.getElementById('view-month').value;
        const query = (document.getElementById('search-input')?.value || "").toLowerCase().trim();
        const isAllTime = (selectedMonth === "Todos");

        ['grande','mediana','chica'].forEach(t => document.getElementById(`list-${t}`).innerHTML = '');

        let totalFact=0, totalCob=0, totalPend=0, count=0;
        let tiers = { grande: { total:0, pendiente:0, count:0 }, mediana: { total:0, pendiente:0, count:0 }, chica: { total:0, pendiente:0, count:0 } };
        let monthlyHistory = {};

        if (isAllTime) {
            // CORRECCIÓN MATEMÁTICA DEL HISTÓRICO CON EXCLUSIÓN DE CLONES VIRTUALES DUPLICADOS
            let consolidatedMap = {};
            let sortedRaw = [...rawClients].sort((a,b) => parseCleanMonth(a.month).localeCompare(parseCleanMonth(b.month)) || a.id.toString().localeCompare(b.id.toString()));
            
            // 1. La plata suma estrictamente el 100% histórico real que matchee la barra de búsqueda
            rawClients.forEach(c => {
                const match = query==="" || (c.name && c.name.toLowerCase().includes(query)) || (c.contact && c.contact.toLowerCase().includes(query)) || (c.notes && c.notes.toLowerCase().includes(query)) || getClientTag(c).toLowerCase().includes(query);
                if (match) {
                    const b = parseFloat(c.budget)||0;
                    totalFact += b;
                    if ((c.status||"").trim().toLowerCase()==="pagado") totalCob += b;
                    else totalPend += b;
                }
            });

            // 2. Agrupamos por ID base para la foto visual actual consolidada (Cartera Activa Única)
            sortedRaw.forEach(item => {
                let baseId = item.id.toString().split('_')[0];
                let isPausado = item.notes && item.notes.toString().toLowerCase().includes("[pausado]");
                const match = query==="" || (item.name && item.name.toLowerCase().includes(query)) || (item.contact && item.contact.toLowerCase().includes(query)) || (item.notes && item.notes.toLowerCase().includes(query)) || getClientTag(item).toLowerCase().includes(query);
                
                if (match) {
                    if (isPausado && !document.getElementById('show-pausados').checked) {
                        delete consolidatedMap[baseId];
                    } else {
                        consolidatedMap[baseId] = { ...item, isVirtual: false, pausado: isPausado };
                    }
                }
            });

            let displayList = Object.values(consolidatedMap);
            displayList.forEach(client => {
                const budget = parseFloat(client.budget)||0;
                if (!client.pausado) {
                    tiers[client.tier].total += budget;
                    tiers[client.tier].pendiente += ((client.status||"").trim().toLowerCase() !== "pagado" ? budget : 0);
                    tiers[client.tier].count++;
                    count++;
                }
                if (currentView === 'tier') {
                    document.getElementById(`list-${client.tier}`).innerHTML += buildClientCard(client);
                }
            });

            if (currentView === 'tag') { renderTagView(displayList); }

            // 3. Gráfico dinámico: la línea responde estrictamente a la búsqueda por texto mes a mes
            getTimelineArray().forEach(m => {
                let itemsInMonth = processRecurrences(m).filter(c => {
                    return query==="" || (c.name && c.name.toLowerCase().includes(query)) || (c.contact && c.contact.toLowerCase().includes(query)) || getClientTag(c).toLowerCase().includes(query);
                });
                monthlyHistory[m] = itemsInMonth.reduce((acc,c) => acc+(parseFloat(c.budget)||0), 0);
            });

        } else {
            // MODO DE RECURRENCIA MENSUAL ESTÁNDAR
            processedClients = processRecurrences(selectedMonth);
            let filteredItems = processedClients.filter(client => {
                return query === "" || (client.name && client.name.toLowerCase().includes(query)) || (client.contact && client.contact.toLowerCase().includes(query)) || (client.notes && client.notes.toLowerCase().includes(query)) || getClientTag(client).toLowerCase().includes(query);
            });

            filteredItems.forEach(client => {
                const budget = parseFloat(client.budget)||0;
                totalFact += budget;
                if ((client.status||"").trim().toLowerCase() === "pagado") totalCob += budget;
                else { totalPend += budget; tiers[client.tier].pendiente += budget; }
                
                if (!client.pausado) {
                    tiers[client.tier].total += budget;
                    tiers[client.tier].count++;
                    count++;
                }
                if (currentView === 'tier') {
                    document.getElementById(`list-${client.tier}`).innerHTML += buildClientCard(client);
                }
            });

            if (currentView === 'tag') { renderTagView(filteredItems); }
            monthlyHistory[selectedMonth] = totalFact;
        }

        // Renderizado de KPIs con etiquetas exactas unificadas
        document.getElementById('kpi-total').innerText = formatMoney(totalFact);
        document.getElementById('kpi-cobrado').innerText = formatMoney(totalCob);
        document.getElementById('kpi-pendiente').innerText = formatMoney(totalPend);
        document.getElementById('kpi-label-cuentas').innerText = isAllTime ? "Cartera Clientes" : "Ítems activos";
        document.getElementById('kpi-cuentas').innerText = isAllTime ? `${count} activos` : `${count} ítems`;

        ['grande','mediana','chica'].forEach(t => {
            document.getElementById(`total-${t}`).innerText = formatMoney(tiers[t].total);
            document.getElementById(`pendiente-${t}`).innerText = formatMoney(tiers[t].pendiente) + " pendiente";
            document.getElementById(`count-${t}`).innerText = tiers[t].count;
        });

        document.getElementById('donut-total').innerText = formatMoney(totalFact);
        updateCharts(tiers, monthlyHistory);
    }

    function buildClientCard(client) {
        const budget = parseFloat(client.budget)||0;
        const isTemporal = client.notes && client.notes.toString().toLowerCase().includes("[temporal]");
        const isFijo = !isTemporal;
        const isSub = client.notes && client.notes.toString().toLowerCase().includes("[sub_de:");
        const isPausado = client.pausado;
        const clientTag = getClientTag(client);
        const isEditable = (client.status || "").trim().toLowerCase() === "pendiente";

        let displayNotes = client.notes ? client.notes.toString().replace(/\[FIJO\]/gi,"").replace(/\[TEMPORAL\]/gi,"").replace(/\[SUB_DE:\s*[^\]]+\]/gi,"").replace(/\[PAUSADO\]/gi,"").replace(/\[TAG:\s*[^\]]+\]/gi,"").trim() : "";

        return `
        <div class="client-item ${isSub?'subordinated':''}${isPausado?' pausado-item':''}">
            <div class="client-top">
                <div><div class="client-name">${isSub?'↳ ':''}${client.name}</div><div class="client-meta">${client.contact} · ${getMonthLabel(client.month)}</div></div>
                <div class="client-top-right">
                    <button class="status-btn ${(client.status||"pendiente").trim().toLowerCase()}" onclick="toggleLiveStatus('${client.id}')">${client.status}</button>
                    <button class="delete-btn" onclick="deleteLiveClient('${client.id}')">×</button>
                </div>
            </div>
            <div class="client-badges"><span class="badge badge-platform">${client.platform}</span>${isFijo?'<span class="badge badge-recurrence">Mensual fijo</span>':''}</div>
            <div class="client-controls">
                <div class="budget-wrap">
                    <span class="budget-symbol">$</span>
                    <input type="number" class="budget-input-live" value="${budget}" ${!isEditable ? 'disabled' : ''} onchange="updateLiveCell('${client.id}','budget',this.value)">
                </div>
                <select class="tier-select-live" onchange="updateLiveCell('${client.id}','tier',this.value)">
                    <option value="grande" ${client.tier==='grande'?'selected':''}>Grande</option>
                    <option value="mediana" ${client.tier==='mediana'?'selected':''}>Mediana</option>
                    <option value="chica" ${client.tier==='chica'?'selected':''}>Chica</option>
                </select>
                ${isFijo?`<select class="account-status-select ${isPausado?'pausado':'activo'}" onchange="updateAccountStatus('${client.id}',this.value)"><option value="activo" ${!isPausado?'selected':''}>🟢 Activo</option><option value="pausado" ${isPausado?'selected':''}>🔴 Pausado</option></select>`:''}
            </div>
            <div class="tag-row"><span class="tag-label"># Tag</span><input type="text" class="tag-input-live" value="${clientTag}" placeholder="Sin tag..." onchange="updateLiveTag('${client.id}',this.value)"></div>
            <div class="notes-row"><span class="notes-label">Obs.</span><input type="text" class="notes-input-live" value="${displayNotes}" placeholder="..." onchange="updateLiveCell('${client.id}','notes',this.value)"></div>
        </div>`;
    }

    function renderTagView(clients) {
        const container = document.getElementById('tags-container'); container.innerHTML = "";
        const groups = {};
        clients.forEach(c => { const tag = getClientTag(c) || "Sin tag"; if (!groups[tag]) groups[tag] = []; groups[tag].push(c); });
        Object.keys(groups).sort().forEach(tag => {
            const items = groups[tag];
            const total = items.reduce((s,c) => s+(parseFloat(c.budget)||0), 0);
            const pend = items.filter(c => (c.status||"").trim().toLowerCase() !== "pagado").reduce((s,c) => s+(parseFloat(c.budget)||0),0);
            const groupId = "tg_" + tag.replace(/\s+/g,"_");
            container.innerHTML += `<div class="tag-group"><div class="tag-group-header" onclick="toggleTagGroup('${groupId}')"><div class="tag-group-header-left"><span class="tag-group-name"># ${tag}</span><span class="tag-group-badge">${items.length}</span></div><div style="display:flex;align-items:center;gap:8px"><div class="tag-group-totals"><div class="tag-group-total-main">${formatMoney(total)}</div><div class="tag-group-total-sub">${formatMoney(pend)} pendiente</div></div><span class="tag-group-collapse-icon" id="${groupId}_icon">▼</span></div></div><div class="tag-group-body" id="${groupId}">${items.map(c => buildClientCard(c)).join('')}</div></div>`;
        });
    }

    function toggleTagGroup(id) { document.getElementById(id).classList.toggle('collapsed'); }
    function setView(v) { currentView = v; document.getElementById('btn-view-tier').classList.toggle('active', v==='tier'); document.getElementById('btn-view-tag').classList.toggle('active', v==='tag'); document.getElementById('tiers-container').style.display = v==='tier'?'block':'none'; document.getElementById('tags-container').style.display = v==='tag'?'block':'none'; renderDashboard(); }

    function updateLiveCell(idStr, field, value) {
        let isVirtual = idStr.toString().includes('_');
        let baseId = idStr.toString().split('_')[0];
        
        // UNIFICACIÓN EN CALIENTE: Modificamos localmente antes de renderizar
        let matchItem = rawClients.find(x => x.id.toString() === baseId || x.id.toString() === idStr);
        if (matchItem) matchItem[field] = field === 'budget' ? parseFloat(value) : value;

        if (!isVirtual) {
            renderDashboard();
            syncPost({ action: "update", id: baseId, [field]: value });
        } else {
            let virtualMonth = idStr.toString().split('_')[1];
            let payload = { ...matchItem, action: "add", id: baseId, month: virtualMonth, [field]: value };
            rawClients.push(payload);
            renderDashboard();
            syncPost(payload);
        }
    }

    function toggleLiveStatus(idStr) {
        let baseId = idStr.toString().split('_')[0];
        let isVirtual = idStr.toString().includes('_');
        
        let matchItem = rawClients.find(x => x.id.toString() === baseId || x.id.toString() === idStr);
        if (!matchItem) return;

        let currentStatus = (matchItem.status || "Pendiente").trim().toLowerCase();
        let nextStatus = currentStatus === "pagado" ? "Pendiente" : "Pagado";
        
        matchItem.status = nextStatus;
        
        if (!isVirtual) {
            renderDashboard();
            syncPost({ action: "update", id: baseId, status: nextStatus });
        } else {
            let virtualMonth = idStr.toString().split('_')[1];
            let payload = { ...matchItem, action: "add", id: baseId, month: virtualMonth, status: nextStatus };
            rawClients.push(payload);
            renderDashboard();
            syncPost(payload);
        }
    }

    function updateAccountStatus(idStr, statusValue) {
        let baseId = idStr.toString().split('_')[0];
        let noteStr = statusValue === "pausado" ? "[PAUSADO]" : "";
        let match = rawClients.find(x => x.id.toString() === baseId);
        if (match) match.notes = noteStr;
        renderDashboard();
        syncPost({ action: "update", id: baseId, notes: noteStr });
    }

    function updateLiveTag(idStr, newTag) {
        let baseId = idStr.toString().split('_')[0];
        let match = rawClients.find(x => x.id.toString() === baseId);
        if (match) { match.tag = newTag; match.notes = `[TAG:${newTag}]`; }
        renderDashboard();
        syncPost({ action: "update", id: baseId, tag: newTag, notes: `[TAG:${newTag}]` });
    }

    function addClient(e) {
        e.preventDefault();
        const payload = {
            action: "add", id: Date.now(),
            name: document.getElementById('form-name').value,
            contact: document.getElementById('form-contact').value,
            budget: parseFloat(document.getElementById('form-budget').value),
            month: document.getElementById('form-month').value,
            tier: document.getElementById('form-tier').value,
            platform: document.getElementById('form-platform').value,
            status: "Pendiente", tag: document.getElementById('form-tag').value,
            notes: document.getElementById('form-recurrence').value === "temporal" ? "[TEMPORAL]" : ""
        };
        rawClients.push(payload);
        renderDashboard();
        syncPost(payload);
    }

    function deleteLiveClient(idStr) {
        if (!confirm("¿Eliminar?")) return;
        let baseId = idStr.toString().split('_')[0];
        rawClients = rawClients.filter(x => x.id.toString() !== baseId);
        renderDashboard();
        syncPost({ action: "delete", id: baseId });
    }

    function updateCharts(tiersData, monthlyHistory) {
        const sortedMonths = Object.keys(monthlyHistory).sort();
        const labels = sortedMonths.map(m => getMonthLabel(m));
        const values = sortedMonths.map(m => monthlyHistory[m]);

        if (historyChart) {
            historyChart.data.labels = labels;
            historyChart.data.datasets[0].data = values;
            historyChart.update();
        } else {
            historyChart = new Chart(document.getElementById('historyChart').getContext('2d'), {
                type: 'line',
                data: { labels, datasets: [{ data: values, borderColor: '#7367f0', borderWidth: 2.5, fill: false, tension: .35 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        const donutData = [tiersData.grande.total, tiersData.mediana.total, tiersData.chica.total];
        if (tierChart) {
            tierChart.data.datasets[0].data = donutData;
            tierChart.update();
        } else {
            tierChart = new Chart(document.getElementById('tierChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['Grandes', 'Medianas', 'Chicas'], datasets: [{ data: donutData, backgroundColor: ['#7367f0','#00cfe8','#ff9f43'] }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '72%', plugins: { legend: { display: false } } }
            });
        }
    }

    async function syncPost(payload) {
        try {
            fetch(SHEET_API_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        } catch(e) { console.error(e); }
    }

    window.onload = loadDataFromSheet;
</script>
</body>
</html>
